<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>¡Gracias por tu pedido! | MINT Speciality</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { stone: { 50: '#f5f5f4', 900: '#1c1917' } }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #f5f5f4; color: #1c1917; overflow-x: hidden; }
        .blend-multiply { mix-blend-mode: multiply; }
        
        .success-icon-container {
            animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes scaleIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="antialiased selection:bg-stone-900 selection:text-white flex items-center justify-center min-h-screen">

    <main class="max-w-xl mx-auto px-6 text-center">
        
        <div class="success-icon-container mb-12">
            <div class="w-24 h-24 bg-stone-900 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
        </div>

        <h1 class="text-5xl font-extrabold tracking-tighter mb-6">Pedido Confirmado.</h1>
        <p class="text-stone-500 text-lg leading-relaxed mb-12">
            Gracias por elegir <span class="text-stone-900 font-bold">MINT Speciality</span>. Hemos recibido tu pago correctamente y estamos preparando tus latas de café de especialidad. Recibirás un correo con los detalles del envío en unos minutos.
        </p>

        <div class="space-y-4">
            <a href="index.html" class="block w-full bg-stone-900 text-white py-5 font-bold tracking-widest uppercase hover:bg-black transition-all rounded-xl">
                VOLVER AL INICIO
            </a>
            <p class="text-xs text-stone-400 font-medium uppercase tracking-[0.2em]">Luxury Coffee Experience</p>
        </div>

    </main>

</body>
</html>
